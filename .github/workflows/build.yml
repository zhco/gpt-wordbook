name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download word data and generate IPA
        run: |
          mkdir -p src/data
          curl -L -o src/data/gptwords.json \
            "https://raw.githubusercontent.com/Ceelog/DictionaryByGPT4/main/gptwords.json"
          npm install phonemize
          node -e "
          const { toIPA } = require('phonemize');
          const fs = require('fs');
          const readline = require('readline');
          const data = {};
          let count = 0;
          const rl = readline.createInterface({
            input: fs.createReadStream('src/data/gptwords.json', { encoding: 'utf-8' })
          });
          rl.on('line', (line) => {
            try {
              const obj = JSON.parse(line.trim());
              const w = obj.word;
              if (w) {
                let ipa = '';
                try { ipa = toIPA(w); } catch(e) {}
                data[w] = { word: w, content: obj.content || '', ipa: ipa };
                count++;
              }
            } catch(e) {}
          });
          rl.on('close', () => {
            fs.writeFileSync('src/data/words.json', JSON.stringify(data));
            console.log('Generated IPA for ' + count + ' words');
          });
          "
          npm uninstall phonemize

      - name: Download ECDICT and supplement TEM-4/TEM-8 words
        run: |
          python3 << 'PYEOF'
          import json, csv, gzip, io, requests, time

          # Load existing words
          with open('src/data/words.json', 'r') as f:
              words = json.load(f)

          # Read TEM-4/TEM-8 word list
          tem4_words = set()
          tem8_words = set()
          with open('src/data/tem4_tem8_raw.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith('*'):
                      word = line[1:].split()[0].replace(',', '').replace(';', '').lower()
                      tem8_words.add(word)
                  else:
                      word = line.split()[0].replace(',', '').replace(';', '').lower()
                      tem4_words.add(word)

          # Find missing words
          existing = set(w.lower() for w in words.keys())
          needed = (tem4_words | tem8_words) - existing
          print(f"Need to supplement: {len(needed)} words")

          if len(needed) == 0:
              print("No words need supplement")
              exit(0)

          # Download ECDICT CSV (gzip compressed)
          print("Downloading ECDICT...")
          url = "https://raw.githubusercontent.com/skywind3000/ECDICT/master/ecdict.csv"
          response = requests.get(url, stream=True, timeout=600)
          response.raise_for_status()

          # Parse gzip CSV
          decompressor = gzip.GzipFile(fileobj=response.raw)
          text_stream = io.TextIOWrapper(decompressor, encoding='utf-8')
          reader = csv.DictReader(text_stream)

          found = 0
          with_examples = 0
          for row in reader:
              word = row['word'].lower()
              if word in needed:
                  content = row['translation'] or row['definition'] or ''
                  content = content.replace('\\n', '\n')
                  # Try to get example sentences from ECDICT detail field
                  detail = row.get('detail', '') or ''
                  examples = []
                  if detail:
                      try:
                          detail_obj = json.loads(detail)
                          if isinstance(detail_obj, list):
                              for item in detail_obj[:3]:  # max 3 examples
                                  if isinstance(item, dict):
                                      en = item.get('en', '') or item.get('example', '')
                                      cn = item.get('cn', '') or item.get('translation', '')
                                      if en:
                                          examples.append(f"{en}")
                                          if cn:
                                              examples.append(f"{cn}")
                      except:
                          pass
                  # Format content with examples
                  formatted = f"### 释义\n\n{content}\n"
                  if examples:
                      formatted += "\n### 例句\n\n"
                      for i, ex in enumerate(examples[:6], 1):
                          formatted += f"{i}. {ex}\n"
                      with_examples += 1
                  words[row['word']] = {
                      'word': row['word'],
                      'content': formatted,
                      'ipa': row['phonetic'] or ''
                  }
                  found += 1
                  if found % 500 == 0:
                      print(f"  Found {found}/{len(needed)} (with examples: {with_examples})")

          print(f"Supplemented {found} words from ECDICT, {with_examples} with examples")

          # Download Youdao dict data for TEM-4/TEM-8 example sentences
          import zipfile, io
          youdao_examples = {}
          for youdao_url in [
              'https://github.com/kajweb/dict/raw/master/book/1521164625401_Level4luan_2.zip',  # 专四核心词汇 4025词
              'https://github.com/kajweb/dict/raw/master/book/1521164650006_Level8luan_2.zip',  # 专八核心词汇 12197词
          ]:
              print(f"Downloading Youdao dict: {youdao_url.split('/')[-1]}...")
              try:
                  yr = requests.get(youdao_url, timeout=120)
                  yr.raise_for_status()
                  with zipfile.ZipFile(io.BytesIO(yr.content)) as z:
                      for name in z.namelist():
                          if name.endswith('.json'):
                              with z.open(name) as f:
                                  for line in f:
                                      try:
                                          obj = json.loads(line)
                                          hw = obj.get('headWord', '').lower()
                                          if not hw:
                                              continue
                                          content = obj.get('content', {})
                                          word_data = content.get('word', {})
                                          word_content = word_data.get('content', {})
                                          sentences = word_content.get('sentence', {}).get('sentences', [])
                                          if sentences:
                                              if hw not in youdao_examples:
                                                  youdao_examples[hw] = []
                                              for s in sentences[:3]:
                                                  en = s.get('sContent', '')
                                                  cn = s.get('sCn', '')
                                                  if en:
                                                      youdao_examples[hw].append(f"{en}")
                                                      if cn:
                                                          youdao_examples[hw].append(f"{cn}")
                                      except:
                                          pass
                  print(f"  Got examples for {len(youdao_examples)} words from this file")
              except Exception as e:
                  print(f"  Failed to download: {e}")

          # Apply Youdao examples to ECDICT-supplemented words
          youdao_count = 0
          for word_key in list(words.keys()):
              w = word_key.lower()
              if w in youdao_examples and '### 例句' not in words[word_key].get('content', ''):
                  exs = youdao_examples[w]
                  content = words[word_key]['content'].rstrip() + "\n\n### 例句\n\n"
                  for i, ex in enumerate(exs[:6], 1):
                      content += f"{i}. {ex}\n"
                  words[word_key]['content'] = content
                  youdao_count += 1
          print(f"Applied Youdao examples to {youdao_count} words")

          # Get example sentences from Free Dictionary API for remaining words without examples
          ecdict_supplemented = [w for w in words.keys() if w.lower() in needed]
          no_examples = [w for w in ecdict_supplemented if '### 例句' not in words[w].get('content', '')]
          print(f"Still need examples: {len(no_examples)} words, trying Free Dictionary API...")
          api_with_examples = 0
          api_total = 0
          for idx, word in enumerate(no_examples):
              try:
                  resp = requests.get(f"https://api.dictionaryapi.dev/api/v2/entries/en/{word}", timeout=5)
                  if resp.status_code == 200:
                      data = resp.json()
                      meanings = data[0].get('meanings', [])
                      # Collect examples
                      examples = []
                      for m in meanings:
                          for d in m.get('definitions', []):
                              ex = d.get('example', '')
                              if ex and len(examples) < 3:
                                  examples.append(ex)
                      if examples:
                          # Append examples to existing content
                          content = words[word]['content'].rstrip() + "\n\n### 例句\n\n"
                          for i, ex in enumerate(examples, 1):
                              content += f"{i}. {ex}\n"
                          words[word]['content'] = content
                          api_with_examples += 1
                      api_total += 1
                  time.sleep(0.05)  # rate limiting
              except Exception as e:
                  pass
              if (idx + 1) % 500 == 0:
                  print(f"  Processed {idx + 1}/{len(ecdict_supplemented)} (got examples: {api_with_examples})")

          print(f"Free Dictionary API: {api_total} words found, {api_with_examples} with examples")

          # For words not found in ECDICT, try Free Dictionary API for full data
          still_missing = needed - set(w.lower() for w in words.keys())
          if still_missing:
              print(f"Still missing: {len(still_missing)} words, trying Free Dictionary API for full data...")
              api_count = 0
              for word in list(still_missing)[:200]:
                  try:
                      resp = requests.get(f"https://api.dictionaryapi.dev/api/v2/entries/en/{word}", timeout=5)
                      if resp.status_code == 200:
                          data = resp.json()
                          meanings = data[0].get('meanings', [])
                          phonetic = data[0].get('phonetic', '')
                          defs = []
                          examples = []
                          for m in meanings:
                              pos = m.get('partOfSpeech', '')
                              for d in m.get('definitions', []):
                                  def_text = d.get('definition', '')
                                  if def_text:
                                      defs.append(f"{pos}: {def_text}" if pos else def_text)
                                  ex = d.get('example', '')
                                  if ex and len(examples) < 3:
                                      examples.append(ex)
                          content = "\n".join(defs[:5])
                          formatted = f"### 释义\n\n{content}\n"
                          if examples:
                              formatted += "\n### 例句\n\n"
                              for i, ex in enumerate(examples, 1):
                                  formatted += f"{i}. {ex}\n"
                          words[word] = {
                              'word': word,
                              'content': formatted,
                              'ipa': phonetic
                          }
                          api_count += 1
                      time.sleep(0.05)
                  except Exception as e:
                      pass
              print(f"Added {api_count} words from Free Dictionary API")

          # Save updated words.json
          with open('src/data/words.json', 'w', encoding='utf-8') as f:
              json.dump(words, f, ensure_ascii=False)

          print(f"Total words: {len(words)}")
          PYEOF

      - name: Build web app
        run: npm run build

      - name: Sync to Capacitor Android
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.3-bin.zip
          unzip -q gradle-7.6.3-bin.zip
          export GRADLE_HOME=$PWD/gradle-7.6.3
          export PATH=$GRADLE_HOME/bin:$PATH
          cd android
          gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpt-wordbook-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "GPT 单词本 ${{ github.ref_name }}"
          body: |
            基于 GPT-4 生成的 8000+ 英语单词深度学习 Android 应用

            ## 功能特性
            - 完全离线使用，无需网络
            - 14000+ 单词（含专四专八）
            - IPA 国际音标显示
            - TTS 语音发音
            - 智能搜索（模糊匹配）
            - 按字母浏览
            - 每日一词
            - 收藏功能
            - 浏览历史
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
